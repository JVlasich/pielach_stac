# Per-campaign sidecar. Place as "campaign.yaml" inside each campaign folder.
# All blocks optional; typically only "collection" is needed.

collection:
  title: Pielach 2024-10-09
  description: >-
    Topo-bathymetric LiDAR survey of the Pielach river
  license: other                 # SPDX id or "other"
  # license_link: https://...    # rel=license link, recommended when license is "other"
  providers:
    - name: TU Wien, Department of Geodesy and Geoinformation
      roles: [processor, host]
      url: https://www.tuwien.at/mg/geo
  keywords: [LiDAR, topo-bathymetry, point cloud, DSM, DTM, Pielach, river]

# Common metadata copied onto every item, auto-rolled into the collection summaries.
# Override tiers: campaign-wide base -> byLabel (registry label) -> byId (exact item id).
# A null value drops the key for the matched items. It only cancels a base value set here,
# extracted keys (gsd, proj:*, pc:*) stay on the item.
properties:
  instruments: [riegl-vq-880-gii]
  platform: airborne
  # byLabel:
  #   orthophoto:
  #     instruments: null        # camera product, scanner does not apply
  # byId:
  #   pielach_2024-10-09_DSM_etrs89:
  #     some_key: value

# CRS fallback, consulted only when a file carries no CRS of its own.
# crs: EPSG:31256

# Registry overrides (rarely needed). A pattern entry replaces the whole default entry;
# a label entry must carry all keys. Example: also accept plain .las point clouds.
# patterns:
#   pointcloud:
#     extensions: [.laz, .las]

# Drop specific files from the catalog. Globs matched case-insensitively against file names.
# exclude:
#   - pielach_2021-03-09.laz     # e.g. a redundant monolithic point cloud
#   - "*_draft.tif"
